name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run release gate (smoke + docs + provenance + clean-room + config)
        run: python scripts/verify_release.py
